
{% extends 'base.html' %}

{% block title %}Home{% endblock %}

{% block content %}

<style>
body{
    background: linear-gradient(to right,#36d1dc,#5b86e5);
    font-family: Arial, sans-serif;
}

h1{
    text-align:center;
    color:white;
    margin-bottom:20px;
}

.table-container{
    width:90%;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0px 4px 10px rgba(0,0,0,0.3);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#4CAF50;
    color:white;
    padding:12px;
}

td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

tr:nth-child(even){
    background:#f2f2f2;
}

tr:hover{
    background:#d4edff;
}

.progress{
    width:100%;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
}

.progress-bar{
    height:25px;
    color:white;
    font-weight:bold;
    line-height:25px;
}

.p90{width:90%; background:#28a745;}
.p75{width:75%; background:#007bff;}
.p60{width:60%; background:#ff9800;}
</style>

<h1>🎓 Coaching Class Management System</h1>

<div class="table-container">
    <table>
        <tr>
              <th>   Rollno </th>
              <th>     Name </th>
              <th>     Marks </th>
              <th>     Performance </th>
              <th>  Progress</th>
        </tr>

        <tr>
            <td>101</td>
            <td>Sakshi</td>
            <td>90</td>
            <td>Excellent ⭐⭐⭐</td>
            <td>
                <div class="progress">
                    <div class="progress-bar p90">90%</div>
                </div>
            </td>
        </tr>

        <tr>
            <td>102</td>
            <td>Arti</td>
            <td>85</td>
            <td>Good ⭐⭐</td>
            <td>
                <div class="progress">
                    <div class="progress-bar p75">75%</div>
                </div>
            </td>
        </tr>

        <tr>
            <td>103</td>
            <td>Nagesh</td>
            <td>80</td>
            <td>Average⭐</td>
            <td>
                <div class="progress">
                    <div class="progress-bar p60">60%</div>
                </div>
            </td>
        </tr>

        <tr>
            <td>103</td>
            <td>Mayuri</td>
            <td>75</td>
            <td>Passed</td>
            <td>
                <div class="progress">
                    <div class="progress-bar p75">75%</div>
                </div>
            </td>
        </tr>

    </table>
</div>

{% endblock %}
