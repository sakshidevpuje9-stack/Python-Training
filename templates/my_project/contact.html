

{% extends 'base.html' %}

{% block content %}

<style>
    .contact-box{
        max-width:700px;
        margin:auto;
        background:white;
        padding:30px;
        border-radius:20px;
        box-shadow:0px 5px 15px rgba(0,0,0,0.2);
    }

    .title{
        text-align:center;
        color:#0077b6;
        margin-bottom:20px;
    }

    label{
        font-weight:bold;
        color:#023e8a;
    }

    input, textarea{
        width:100%;
        padding:12px;
        margin-top:5px;
        margin-bottom:15px;
        border:2px solid #90e0ef;
        border-radius:10px;
    }

    button{
        background:linear-gradient(90deg,#0077b6,#00b4d8);
        color:white;
        border:none;
        padding:12px 25px;
        border-radius:10px;
        width:100%;
        font-size:18px;
        cursor:pointer;
    }

    button:hover{
        opacity:0.9;
    }

    .info{
        text-align:center;
        margin-bottom:20px;
        color:#555;
    }
</style>

<section class="container mt-4">

    <div class="contact-box">

        <h2 class="title">📞 Contact Us</h2>

        <p class="info">
            Have any questions? Send us a message!
        </p>

        <form>

            <label>👤 Full Name</label>
            <input type="text" placeholder="Enter your name">

            <label>📧 Email</label>
            <input type="email" placeholder="Enter your email">

            <label>📱 Mobile Number</label>
            <input type="tel" placeholder="Enter mobile number">

            <label>💬 Message</label>
            <textarea rows="5" placeholder="Write your message"></textarea>

            <button type="submit">
                Send Message 🚀
            </button>

        </form>

    </div>

</section>

{% endblock %}
