<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coaching Class Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Top Header Gradient -->
    <div class="top-header">
        <div class="logo">
            🎓 Coaching Class Manager
        </div>
        <div class="nav-links">
            <a href="#">home</a>
            <a href="#">Records</a>
            <a href="#">About</a>
        </div>
    </div>

    <!-- Main Nav Bar -->
    <div class="main-nav">
        <a href="/" class="nav-btn {% if active_page == 'home' %}active{% endif %}">🏠 home</a>
        <a href="/students" class="nav-btn {% if active_page == 'students' %}active{% endif %}">👨‍🎓 Students</a>
        <a href="/records" class="nav-btn {% if active_page == 'records' %}active{% endif %}">📊 Records</a>
        <a href="/about" class="nav-btn {% if active_page == 'about' %}active{% endif %}">ℹ️ About</a>
        <a href="/contact" class="nav-btn {% if active_page == 'contact' %}active{% endif %}">📞 Contact</a>
    </div>

    <!-- Content Area -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <!-- Footer -->
    <footer>
        © 2026 Coaching Class Manager
    </footer>
</body>
</html>
