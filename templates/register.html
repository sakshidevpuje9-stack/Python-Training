
<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body{
            margin:0;
            padding:0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right,#36D1DC,#5B86E5);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .register-box{
            background:white;
            padding:40px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
            width:450px;
        }

        h1{
            text-align:center;
            color:#5B86E5;
            font-size:40px;
        }

        label{
            font-size:24px;
            font-weight:bold;
        }

        input{
            width:100%;
            height:50px;
            font-size:22px;
            margin-top:10px;
            margin-bottom:20px;
            border:2px solid #5B86E5;
            border-radius:8px;
            padding-left:10px;
        }

        .password-box{
            position:relative;
        }

        .eye{
            position:absolute;
            right:10px;
            top:22px;
            cursor:pointer;
            font-size:25px;
        }

        button{
            width:100%;
            height:55px;
            font-size:24px;
            background:#5B86E5;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#3f6fd8;
        }
    </style>
</head>
<body>

<div class="register-box">
    <h1>Register</h1>

    <form method="POST">

        <label>Username</label>
        <input type="text" name="username" placeholder="Enter Username" required>

        <label>Password</label>

        <div class="password-box">
            <input type="password" id="password" name="password"
                   placeholder="Enter Password" required>
            <span class="eye" onclick="togglePassword()">👁️</span>
        </div>

        <button type="submit">Register</button>

    </form>
</div>

<script>
function togglePassword(){
    let pass = document.getElementById("password");

    if(pass.type === "password"){
        pass.type = "text";
    }
    else{
        pass.type = "password";
    }
}
</script>

</body>
</html>
