{% extends 'base.html' %}

{% block title %}Home{% endblock %}

{% block content %}

<style>
.home-container{
    text-align:center;
    margin-top:80px;
}

.home-container h1{
    color:#2c3e50;
    font-size:40px;
    margin-bottom:20px;
}

.home-container p{
    font-size:20px;
    color:#555;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    padding:12px 25px;
    background:#3498db;
    color:white;
    text-decoration:none;
    border-radius:5px;
    font-size:18px;
}

.btn:hover{
    background:#2980b9;
}
</style>

<div class="home-container">
    <h1>Student Management System</h1>

    <p>
        Welcome to Student Management System.
        Here you can Add, View, Update and Delete student records.
    </p>

    <a href="{{ url_for('add_student') }}" class="btn">
        Add Student
    </a>
</div>

{% endblock %}
