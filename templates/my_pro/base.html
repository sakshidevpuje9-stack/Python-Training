<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Management System{% endblock %}</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        nav{
            background:#2c3e50;
            padding:15px;
        }

        nav ul{
            list-style:none;
            display:flex;
            justify-content:center;
        }

        nav ul li{
            margin:0 15px;
        }

        nav ul li a{
            color:white;
            text-decoration:none;
            font-size:18px;
            font-weight:bold;
        }

        nav ul li a:hover{
            color:#f1c40f;
        }

        .container{
            width:90%;
            margin:30px auto;
        }

        footer{
            background:#2c3e50;
            color:white;
            text-align:center;
            padding:12px;
            position:fixed;
            bottom:0;
            width:100%;
        }
    </style>
</head>
<body>

    <nav>
        <ul>
            <li><a href="{{ url_for('home') }}">Home</a></li>
            <li><a href="{{ url_for('add_student') }}">Add Student</a></li>
            <li><a href="{{ url_for('students') }}">Students</a></li>
            <li><a href="{{ url_for('about') }}">About</a></li>
        </ul>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        <p>Student Management System © 2026</p>
    </footer>

</body>
</html>
