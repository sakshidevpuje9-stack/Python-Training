<!DOCTYPE html>
<html>
    <head>
        <title>Add Student</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
              rel="stylesheet">
    </head>
    <body class = 'bg-light'>
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-5">
                 <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-3">➕ Add Student</h4>
                        {% if not subjects %}
                        <div class="alert alert-warning">
                            ⚠️ No subjects found. Please add a subject first.
                        </div>
                        {% endif %}

                        <form method="POST" action="{{ url_for('add_student') }}">
                            <input type="text" name = "name" class="form-control mb-2" placeholder="Student Name" required> 

                            <select name="subject_id" class = "form-select mb-3">
                                {% for subject in subjects %}
                                    <option value="{{ subject.id }}">{{ subject.name }}</option>
                                {% endfor %}
                            </select>

                            <button type="submit" class="btn btn-dark">Add Student</button>
                        </form>
                        <a href="{{url_for('home')}}" class="btn btn-link mt-3">⬅️ Back to Home</a>
                    </div>
                 </div>
        </div>
    </body>
</html>
