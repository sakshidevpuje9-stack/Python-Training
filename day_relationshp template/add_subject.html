<!DOCTYPE html>
<html>
    <head>
        <title>Add Subject</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
              rel="stylesheet">
    </head>
    <body class = 'bg-light'>
        <div class="container mt-5">
            <div class="row justify-content-center">
                <div class="col-md-5">
                 <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="fw-bold mb-3">➕ Add Subject</h4>
                        <form method="POST" action="{{ url_for('add_subject') }}">
                            <input type="text" name="name" class="form-control mb-2" placeholder="Subject Name">
                            <button type="submit" class="btn btn-dark">Add Subject</button>
                        </form>
                    </div>
                 </div>
        </div>
    </body>
</html>
